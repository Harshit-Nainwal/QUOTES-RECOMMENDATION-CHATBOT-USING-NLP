version: "3.1"

intents:
  - greet
  - motivation
  - inspiration
  - love
  - funny
  - success
  - goodbye
  - affirm
  - feedback
  - ask_more
  - nlu_fallback

responses:

  utter_greet:
  - text: "Hello! I'm your Quotes Recommendation Bot. How can I inspire you today?"
  - text: "Hi there! Would you like a motivational, inspirational, funny, love, or success quote?"
  - text: "Hey! I'm here to share some amazing quotes with you."

  utter_motivation:
  - text: "Believe you can and you're halfway there."
  - text: "Push yourself, because no one else is going to do it for you."
  - text: "Don't watch the clock; do what it does. Keep going."
  - text: "Dream big and dare to fail."
  - text: "Success starts with self-belief."

  utter_inspiration:
  - text: "The best way to predict the future is to create it."
  - text: "Do what you can with all you have, wherever you are."
  - text: "Start where you are. Use what you have. Do what you can."
  - text: "Difficult roads often lead to beautiful destinations."
  - text: "Your only limit is your mind."

  utter_love:
  - text: "Love is composed of a single soul inhabiting two bodies."
  - text: "Where there is love there is life."
  - text: "You are my today and all of my tomorrows."
  - text: "Love is not about how many days you have been together, but how much you love each other every day."
  - text: "True love stories never have endings."

  utter_funny:
  - text: "I'm not lazy, I'm on energy-saving mode."
  - text: "Life is short. Smile while you still have teeth."
  - text: "I'm not arguing, I'm just explaining why I'm right."
  - text: "Why don’t scientists trust atoms? Because they make up everything!"
  - text: "I used to think I was indecisive, but now I'm not so sure."

  utter_success:
  - text: "Success usually comes to those who are too busy to be looking for it."
  - text: "Don't be afraid to give up the good to go for the great."
  - text: "Success is not the key to happiness. Happiness is the key to success."
  - text: "The road to success and the road to failure are almost exactly the same."
  - text: "Opportunities don't happen. You create them."

  utter_affirm:
  - text: "Great! Would you like another quote?"

  utter_feedback:
  - text: "Glad you liked it! Want another quote?"

  utter_ask_more:
  - text: "Sure! What type of quote would you like? Motivation, funny, love, or success?"

  utter_goodbye:
  - text: "Goodbye! Have a great day."
  - text: "See you later! Stay inspired."
  - text: "Bye! Come back anytime for more quotes."

  utter_fallback:
  - text: "Sorry, I didn't understand that. You can ask for motivational, funny, love, or success quotes."

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true